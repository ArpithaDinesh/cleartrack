services:
  - type: web
    name: cleartrack-backend
    env: node
    region: singapore
    rootDir: cleartrack-backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: "10000"
      - key: NODE_VERSION
        value: "20"
      - key: MONGODB_URI
        value: "REPLACE_WITH_YOUR_MONGODB_ATLAS_URI"
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://cleartrack-react.vercel.app
