services:
  - type: web
    name: cleartrack-backend
    env: node
    plan: free
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    protocol: http
    rootDir: cleartrack-backend
    envVars:
      - key: PORT
        value: "10000"
      - key: NODE_VERSION
        value: "20"
      - key: MONGODB_URI
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://cleartrack-react.vercel.app
